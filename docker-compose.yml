services:
  gestaoclinica:
    build: .
    container_name: gestaoclinica-docker
    restart: always
    ports:
      - "5002:5002"
    volumes:
      - ./logs:/app/logs
      - pdf_temp:/app/pdf_temp
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0

  redis:
    image: redis:7-alpine
    container_name: gestaoclinica-redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    build: .
    container_name: gestaoclinica-celery
    restart: always
    command: sh scripts/start_celery.sh
    volumes:
      - pdf_temp:/app/pdf_temp
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0

  postgres:
    image: postgres:16-alpine
    container_name: gestaoclinica-postgres
    restart: always
    environment:
      POSTGRES_DB: clinica
      POSTGRES_USER: clinica_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinica_user -d clinica"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  pdf_temp:
  postgres_data:
