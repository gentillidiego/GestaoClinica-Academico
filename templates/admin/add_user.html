{% extends "base.html" %}

{% block title %}Adicionar Usuário - Administração{% endblock %}

{% block content %}
<div style="max-width: 550px; margin: 4rem auto;" class="animate-fade">
    <div style="margin-bottom: 2rem;">
        <a href="{{ url_for('admin.list_users') }}"
            style="display: inline-flex; align-items: center; gap: 0.5rem; color: hsl(var(--text-muted)); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: color 0.2s;"
            onmouseover="this.style.color='hsl(var(--primary))'" onmouseout="this.style.color='hsl(var(--text-muted))'">
            <span>⬅️</span> Voltar para Usuários
        </a>
    </div>
    <div class="card" style="padding: 3rem;">
        <div style="text-align: center; margin-bottom: 3rem;">
            <div style="font-size: 2.5rem; margin-bottom: 1rem;">👤✨</div>
            <h1
                style="font-family: var(--font-heading); font-size: 1.75rem; font-weight: 800; color: hsl(var(--primary));">
                Novo Membro</h1>
            <p style="color: hsl(var(--text-muted)); margin-top: 0.5rem;">Crie uma nova credencial de acesso.</p>
        </div>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div style="margin-bottom: 1.5rem;">
                <label for="full_name" class="form-label">Nome Completo</label>
                <input type="text" name="full_name" id="full_name" class="form-control" placeholder="Ex: João da Silva"
                    required autofocus>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label for="username" class="form-label">Nome de Usuário</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Ex: joao.silva"
                    required autofocus>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label for="password" class="form-label">Senha Inicial</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="••••••••"
                    required>
            </div>

            <div style="margin-bottom: 2.5rem;">
                <label for="role" class="form-label">Nível de Acesso (Perfil)</label>
                <select name="role" id="role" class="form-control" required onchange="toggleMatricula()">
                    <option value="" disabled selected>Selecione um perfil...</option>
                    <option value="admin">Administrador (Acesso Total)</option>
                    <option value="aluno">Aluno (Consultas/Anamnese)</option>
                    <option value="atendimento">Atendimento (Secretaria)</option>
                    <option value="professor">Professor (Supervisor)</option>
                </select>
            </div>

            <div style="margin-bottom: 2.5rem; display: none;" id="matricula_container">
                <label for="matricula" class="form-label">Matrícula</label>
                <input type="text" name="matricula" id="matricula" class="form-control" placeholder="Ex: 123456789">
            </div>

            <div style="display: flex; gap: 1.25rem;">
                <button type="submit" class="btn btn-primary" style="flex: 2; height: 50px;">
                    Criar Credencial
                </button>
                <a href="{{ url_for('admin.list_users') }}" class="btn btn-outline" style="flex: 1; height: 50px;">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    function toggleMatricula() {
        var role = document.getElementById('role').value;
        var matriculaContainer = document.getElementById('matricula_container');
        var matriculaInput = document.getElementById('matricula');

        if (role === 'aluno') {
            matriculaContainer.style.display = 'block';
            matriculaInput.required = true;
        } else {
            matriculaContainer.style.display = 'none';
            matriculaInput.required = false;
            matriculaInput.value = '';
        }
    }
</script>
{% endblock %}
