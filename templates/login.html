{% extends "base.html" %}

{% block title %}Login - Gestão Clínica{% endblock %}

{% block content %}
<div
    style="height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top right, hsl(var(--primary) / 0.05), transparent);">
    <div class="card animate-fade" style="width: 100%; max-width: 420px; padding: 3rem;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🦷</div>
            <h1 class="page-title" style="font-size: 2rem;">Acesse sua Conta</h1>
            <p class="page-subtitle" style="font-size: 1rem;">Sistema de Gestão Clínica Universitária</p>
        </div>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div style="margin-bottom: 1.5rem;">
                <label for="username" class="form-label">Usuário</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Seu nome de usuário"
                    required autofocus>
            </div>

            <div style="margin-bottom: 2rem;">
                <label for="password" class="form-label">Senha</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="••••••••"
                    required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; height: 50px; font-size: 1.1rem;">
                Entrar no Sistema
            </button>
        </form>

        <div style="margin-top: 2rem; text-align: center;">
            <p style="font-size: 0.875rem; color: hsl(var(--text-muted));">
                Problemas com acesso? <a href="#"
                    style="color: hsl(var(--primary)); text-decoration: none; font-weight: 600;">Contate o suporte</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
