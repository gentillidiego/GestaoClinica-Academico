<script>
    function initPagination(container) {
        const paginatedLists = container.querySelectorAll('[data-paginate="true"]');
        paginatedLists.forEach(list => {
            const items = Array.from(list.children).filter(el => !el.classList.contains('no-paginate'));
            const perPage = parseInt(list.getAttribute('data-per-page')) || 5;
            if (items.length <= perPage) return;
            
            let currentPage = 1;
            const totalPages = Math.ceil(items.length / perPage);
            
            const controls = document.createElement('div');
            controls.className = 'pagination-controls';
            controls.style.cssText = 'display: flex; gap: 0.5rem; justify-content: center; margin-top: 1.5rem; align-items: center; width: 100%;';
            
            const updateView = () => {
                items.forEach((item, index) => {
                    item.style.display = (index >= (currentPage-1)*perPage && index < currentPage*perPage) ? '' : 'none';
                });
                controls.innerHTML = `
                    <button class="btn btn-outline" style="padding: 0.4rem 0.8rem;" ${currentPage === 1 ? 'disabled' : ''}>Anterior</button>
                    <span style="font-size: 0.9rem; font-weight: 600; color: hsl(var(--text-muted));">Página ${currentPage} de ${totalPages}</span>
                    <button class="btn btn-outline" style="padding: 0.4rem 0.8rem;" ${currentPage === totalPages ? 'disabled' : ''}>Próxima</button>
                `;
                const btns = controls.querySelectorAll('button');
                if(btns[0]) btns[0].onclick = () => { if(currentPage > 1) { currentPage--; updateView(); } };
                if(btns[1]) btns[1].onclick = () => { if(currentPage < totalPages) { currentPage++; updateView(); } };
            };
            
            const insertAnchor = list.tagName.toLowerCase() === 'tbody' ? list.closest('table') : list;
            insertAnchor.parentNode.insertBefore(controls, insertAnchor.nextSibling);
            updateView();
        });
    }

    async function switchTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
            tabcontent[i].classList.remove("active");
        }
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].classList.remove("active");
        }
        
        const target = document.getElementById(tabName);
        if (target) {
            target.style.display = "block";
            target.classList.add("active");
            
            // Lazy loading logic
            if (target.getAttribute('data-loaded') === 'false') {
                target.innerHTML = `
                    <div class="tab-loader">
                        <div class="spinner"></div>
                        <p>Carregando dados...</p>
                    </div>
                `;
                try {
                    const baseUrl = "{{ url_for('patients.get_tab_content', id=patient.id, tab_name='TAB_NAME') }}";
                    const fetchUrl = baseUrl.replace('TAB_NAME', tabName);
                    
                    const response = await fetch(fetchUrl);
                    if (!response.ok) throw new Error('Falha ao carregar conteúdo');
                    const html = await response.text();
                    target.innerHTML = html;
                    target.setAttribute('data-loaded', 'true');
                    
                    if (typeof initPagination === 'function') initPagination(target);
                    
                    // Re-inicialização de componentes específicos se necessário
                    if (tabName === 'tab-receituario' || tabName === 'tab-atestado') {
                        // Scripts de documentos carregados dinamicamente
                    }
                } catch (error) {
                    target.innerHTML = `
                        <div class="tab-loader" style="color: hsl(var(--danger));">
                            <p>❌ Erro ao carregar aba. Tente recarregar a página.</p>
                        </div>
                    `;
                    console.error('Erro no lazy loading:', error);
                }
            }
        }
        
        if (evt && evt.currentTarget) {
            evt.currentTarget.classList.add("active");
        } else {
            const btn = document.querySelector(`button[onclick*="'${tabName}'"]`);
            if (btn) btn.classList.add("active");
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (document.getElementById(hash) && document.getElementById(hash).classList.contains('tab-content')) {
                switchTab(null, hash);
                const tabsContainer = document.querySelector('.tabs-container');
                if (tabsContainer) tabsContainer.scrollIntoView({ behavior: 'smooth' });
            } else {
                switchTab(null, 'tab-paciente');
            }
        } else {
            switchTab(null, 'tab-paciente');
        }
    });

    function openEtapaSignModal(actionUrl) {

    function openAddPaymentModal(actionUrl) {
        const modal = document.getElementById('paymentModal');
        const form = document.getElementById('paymentForm');
        form.action = actionUrl;

        const canvas = document.getElementById('signature-pad-payment');
        if (canvas && typeof SignaturePad !== 'undefined' && !canvas.padInitialized) {
            const signaturePad = new SignaturePad(canvas, { backgroundColor: 'rgb(255, 255, 255)' });
            document.getElementById('clear-signature-payment').addEventListener('click', () => signaturePad.clear());

            form.addEventListener('submit', function (e) {
                if (signaturePad.isEmpty()) {
                    e.preventDefault();
                    alert('Por favor, solicite a assinatura do paciente.');
                    return;
                }
                document.getElementById('assinatura_base64_payment').value = signaturePad.toDataURL();
            });

            function resizeCanvasPag() {
                const ratio = Math.max(window.devicePixelRatio || 1, 1);
                canvas.width = canvas.offsetWidth * ratio;
                canvas.height = canvas.offsetHeight * ratio;
                canvas.getContext("2d").scale(ratio, ratio);
                signaturePad.clear();
            }
            window.addEventListener("resize", resizeCanvasPag);
            resizeCanvasPag();
            canvas.padInitialized = true;
            setTimeout(resizeCanvasPag, 100);
        }

        modal.style.display = 'flex';
    }

    function closeAddPaymentModal() {
        document.getElementById('paymentModal').style.display = 'none';
        document.getElementById('paymentForm').reset();
    }

            originalClose();
            window.closeSignModal = originalClose;
        };

        modal.style.display = 'flex';
    }

    function switchSubTab(evt, subtabName) {
        var i, subtabcontent, subtablinks;
        subtabcontent = document.getElementsByClassName("subtab-content");
        for (i = 0; i < subtabcontent.length; i++) {
            subtabcontent[i].style.display = "none";
            subtabcontent[i].classList.remove("active");
        }
        subtablinks = document.getElementsByClassName("subtab-btn");
        for (i = 0; i < subtablinks.length; i++) {
            subtablinks[i].classList.remove("active");
        }
        document.getElementById(subtabName).style.display = "block";
        document.getElementById(subtabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function handleTabClick(evt, tabName) {
        const btn = evt.currentTarget;
        if (btn.getAttribute('data-locked') === '1') {
            showTcleAlert();
            return;
        }
        switchTab(evt, tabName);
    }

    function showTcleAlert() {
        alert('Acesso Bloqueado: Este prontuário só será liberado após o paciente assinar o Termo de Consentimento (TCLE).');
    }

    function openPatientSignModal(actionUrl) {
        const modal = document.getElementById('patientSignModal');
        const form = document.getElementById('patientSignForm');
        form.action = actionUrl;

        // Setup signature pad for patient sign modal
        const canvas = document.getElementById('signature-pad-patient');
        if (canvas && typeof SignaturePad !== 'undefined' && !canvas.padInitialized) {
            const signaturePad = new SignaturePad(canvas, { backgroundColor: 'rgb(255, 255, 255)' });
            document.getElementById('clear-signature-patient').addEventListener('click', () => signaturePad.clear());

            form.addEventListener('submit', function (e) {
                if (signaturePad.isEmpty()) {
                    e.preventDefault();
                    alert('Por favor, assine no quadro ou clique em Cancelar.');
                    return;
                }
                document.getElementById('assinatura_base64_patient').value = signaturePad.toDataURL();
            });

            function resizeCanvas() {
                const ratio = Math.max(window.devicePixelRatio || 1, 1);
                canvas.width = canvas.offsetWidth * ratio;
                canvas.height = canvas.offsetHeight * ratio;
                canvas.getContext("2d").scale(ratio, ratio);
                signaturePad.clear();
            }
            window.addEventListener("resize", resizeCanvas);
            resizeCanvas();
            canvas.padInitialized = true;

            // Call again after modal display to fix sizing issues
            setTimeout(resizeCanvas, 100);
        } else if (canvas && canvas.padInitialized) {
            // just clear it
            const clearBtn = document.getElementById('clear-signature-patient');
            if (clearBtn) clearBtn.click();
        }

        modal.style.display = 'flex';
    }

    let isSaving = false;
    function startInlineEdit(button) {
        if (isSaving) return;
        
        const container = button.closest('.inline-edit-obs-container');
        const textSpan = container.querySelector('.obs-text');
        const currentText = textSpan.innerText;
        
        const textarea = document.createElement('textarea');
        textarea.value = currentText;
        textarea.className = 'form-control';
        textarea.style.width = '100%';
        textarea.style.minHeight = '60px';
        textarea.style.fontSize = '0.85rem';
        textarea.style.padding = '0.4rem';
        textarea.style.resize = 'vertical';
        
        textSpan.style.display = 'none';
        button.style.display = 'none';
        container.appendChild(textarea);
        
        textarea.focus();

        textarea.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                textarea.blur();
            }
        });

        textarea.addEventListener('blur', function() {
            if (isSaving) return;
            isSaving = true;

            const newText = textarea.value.trim();

            if (newText === '') {
                alert('A descrição não pode ficar vazia.');
                isSaving = false;
                textarea.focus();
                return;
            }

            if (newText === currentText) {
                textSpan.style.display = '';
                button.style.display = '';
                textarea.remove();
                isSaving = false;
                return;
            }

            const formData = new FormData();
            formData.append('observacoes', newText);
            
            const tr = container.closest('tr');
            const editBtn = tr.querySelector('button[title="Editar"]');
            const dataSessao = editBtn ? editBtn.getAttribute('data-date') : new Date().toISOString().split('T')[0];
            formData.append('data', dataSessao);
            
            const csrfInput = document.querySelector('input[name="csrf_token"]');
            if (csrfInput) {
                formData.append('csrf_token', csrfInput.value);
            }

            const editUrl = button.getAttribute('data-url');

            fetch(editUrl, {
                method: 'POST',
                body: formData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => {
                if (response.ok) {
                    textSpan.innerText = newText;
                    if (editBtn) {
                        editBtn.setAttribute('data-obs', newText);
                    }
                    textSpan.style.display = '';
                    button.style.display = '';
                    textarea.remove();
                } else {
                    alert('Erro ao salvar as alterações.');
                    textSpan.style.display = '';
                    button.style.display = '';
                    textarea.remove();
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Erro de conexão ao salvar.');
                textSpan.style.display = '';
                button.style.display = '';
                textarea.remove();
            });
        });

        textarea.addEventListener('click', function(e) {
            e.stopPropagation();
        });
    }
</script>
